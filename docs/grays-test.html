<!doctype html>
<html>
    <head>
        <link rel="stylesheet" href="styles/reset.css" />
        <link rel="stylesheet" href="styles/grays.css" />
        <style>
            body {
                background: #fff;
                padding: 24px;
            }

            .swatch-grid {
                background: #000;
                border: 1px solid #000;
                box-sizing: border-box;
                display: grid;
                gap: 1px;
                grid-template-columns: repeat(17, 18px);
                grid-template-rows: repeat(2, 18px);
                width: 324px;
            }
            .swatch-grid.og {
                width: 305px;
                grid-template-columns: repeat(16, 18px);
            }

            .pair-grid {
                margin-top: 24px;
                width: 324px;
                grid-template-columns: repeat(17, 18px);
                grid-template-rows: 18px 72px 18px 72px;
            }

            .swatch {
                box-sizing: border-box;
                height: 18px;
                width: 18px;
            }

            .swatch.blank {
                background: pink;
            }

            .swatch.spacer {
                background: #fff;
            }

            .swatch-label {
                align-items: center;
                background: #fff;
                box-sizing: border-box;
                color: #000;
                display: flex;
                font-family: monospace;
                font-size: 10px;
                height: 72px;
                justify-content: center;
                line-height: 10px;
                padding: 4px 0;
                text-align: center;
                width: 18px;
                writing-mode: vertical-rl;
            }
        </style>
    </head>
