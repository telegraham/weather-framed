<!doctype html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <title>Weather</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Emoji:wght@300..700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles/reset.css" />
        <link rel="stylesheet" href="styles/hack.css" />
        <link rel="stylesheet" href="styles/fonts.css" />
        <link rel="stylesheet" href="styles/weather.css" />
        <link rel="stylesheet" href="styles/grays.css" />
        <script type="text/javascript" src="scripts/ConditionsParser.js"></script>
        <script type="text/javascript" src="scripts/Hour.js"></script>
        <script type="text/javascript" src="scripts/HourlyParser.js"></script>
        <script type="text/javascript" src="scripts/DailyParser.js"></script>
        <script type="text/javascript" src="scripts/WeatherDataStore.js"></script>
        <script type="text/javascript" src="scripts/TemperatureRange.js"></script>
        <script type="text/javascript" src="scripts/PrecipitationPeriod.js"></script>
        <script type="text/javascript" src="scripts/ConditionEmoji.js"></script>
        <script type="text/javascript" src="scripts/Forecast.js"></script>
        <script type="text/javascript" src="scripts/ConditionsRenderer.js"></script>
        <script type="text/javascript" src="scripts/ForecastRenderer.js"></script>
        <script type="text/javascript" src="scripts/ConfigStore.js"></script>
        <script type="text/javascript" src="scripts/WeatherService.js"></script>
        <script type="text/javascript" src="scripts/AppController.js"></script>
        <script type="text/javascript" src="scripts/index.js"></script>
    </head>
    <body id="body">
        <div id="setup-banner" class="setup-banner"></div>
        <div class="wrapper">
            <div class="conditions">
                <div class="now">
                    <div class="condition-row condition-row-head clearfix">
                        <span id="condition-emoji" class="text-emoji condition-emoji">
                            <span class="tornado">🌪️</span>
                            <span class="shark">🦈</span>
                        </span>
                        <span id="now-label" class="now-label"></span>
                        <span id="description" class="description">Sharknado</span>
                    </div>
                    <div class="condition-row">
                        <span class="temp-wrapper"><span id="current-temp" class="temp-value numeric-value">--</span>&deg;</span>
                        <span class="feels-like"> feels like </span>
                        <span class="temp-wrapper"><span id="real-feel" class="temp-value numeric-value">--</span>&deg;</span>
                    </div>
                    <div class="condition-row">
                        <span class="inline-stat"><span class="emoji-label">🌬️</span> <span id="current-wind" class="numeric-value">--</span> mph</span>
                        <span class="inline-stat"><span class="emoji-label">💧</span> <span id="current-humidity" class="numeric-value">--</span>%</span>
                        <span class="inline-stat"><span class="emoji-label">🦞</span> <span id="current-uv" class="numeric-value">--</span></span>
                    </div>
                    <div class="condition-row">
                        <span class="inline-stat"><span class="emoji-label">🔭</span> <span id="current-visibility" class="numeric-value">--</span> mi</span>
                        <span class="inline-stat"><span class="emoji-label">🌫️</span> <span id="current-cloud-cover" class="numeric-value">--</span>%</span>
                    </div>
                    <div class="condition-row">
                        <span class="inline-stat"><span class="emoji-label">🌅</span> <span id="sunrise-time" class="numeric-value">--</span></span>
                        <span class="inline-stat"><span class="emoji-label">🌇</span> <span id="sunset-time" class="numeric-value">--</span></span>
                    </div>
                </div>
                <div class="today">
                    <div class="condition-row condition-row-head clearfix">
                        <span id="today-emoji" class="text-emoji condition-emoji today-emoji" ></span>
                        <span id="today-label" class="today-label"></span>
                        <span id="today-description" class="today-description">Day forecast</span>
                    </div>
                    <div class="condition-row">
                        <span class="inline-stat"><span class="emoji-label">🌬️</span> <span id="day-wind" class="numeric-value">--</span> mph</span>
                        <span class="inline-stat"><span class="emoji-label">💧</span> <span id="day-humidity" class="numeric-value">--</span>%</span>
                        <span class="inline-stat"><span class="emoji-label">🦞</span> <span id="day-uv" class="numeric-value">--</span></span>
                    </div>
                    <div class="condition-row condition-row-head night-row-head clearfix">
                        <span id="tonight-emoji" class="text-emoji condition-emoji tonight-emoji"></span>
                        <span class="tonight-label">tonight</span>
                        <span id="tonight-description" class="today-description">Night forecast</span>
                    </div>
                    <div class="condition-row">
                        <span class="inline-stat"><span class="emoji-label">🌬️</span> <span id="night-wind" class="numeric-value">--</span> mph</span>
                        <span class="inline-stat"><span class="emoji-label">💧</span> <span id="night-humidity" class="numeric-value">--</span>%</span>
                    </div>
                    <div class="condition-row">
                        <span id="moon-phase" class="moon-phase-value">--</span><span id="next-moon-bullet" style="display: none;"> • </span><span id="next-moon"></span>
                    </div>
                    <div class="condition-row">
                        <span class="inline-stat"><span class="emoji-label">↗️</span> <span id="moonrise-time" class="numeric-value">--</span></span>
                        <span class="inline-stat"><span class="emoji-label">↘️</span> <span id="moonset-time" class="numeric-value">--</span></span>
                    </div>
                </div>
            </div>
            <div class="forecast">
                <ol id="temps" class="hourly temps"></ol>
                <ol id="hours" class="hourly hours"></ol>
                <ol id="precips" class="hourly precips"></ol>
            </div>
        </div>
    </body>
</html>
